version: 3

# Specmatic TEST mode configuration for the Accounts contract.
#
# This config is used with `specmatic test` (NOT `specmatic mock`).
# Specmatic will act as a test CLIENT:
#   - Read the spec from stripe-accounts-contract.json
#   - Auto-generate HTTP requests for GET /v1/accounts
#   - Fire them at the stub server on port 3000
#   - Validate that responses match the contract
#
# Usage:
#   1. Start stub server:  python specmatic_test/accounts_stub_server.py
#   2. Run contract test:  (see run_contract_test.ps1)
#
# Valid top-level keys in Specmatic v3:
#   components, dependencies, mcp, proxies, specmatic, systemUnderTest, version

components:
  sources:
    accountsSpec:
      filesystem:
        directory: specmatic_test/specs

  services:
    accountsService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/accountsSpec"
            specs:
              - stripe-accounts-contract.json

# "systemUnderTest" = the service being TESTED by specmatic test
# (contrast with "dependencies" = services being MOCKED by specmatic mock)
systemUnderTest:
  service:
    $ref: "#/components/services/accountsService"

specmatic:
  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic

