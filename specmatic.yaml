version: 3

# Stripe API contract validation configuration.
# Run: specmatic mock --port 9000
# Specmatic will resolve stripe-official.json from the filesystem source
# and serve mock endpoints for the Stripe dependency.

components:
  sources:
    stripeSpecs:
      filesystem:
        directory: specmatic_test/specs

  services:
    stripeService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/stripeSpecs"
            specs:
              - stripe-official.json

dependencies:
  services:
    - service:
        $ref: "#/components/services/stripeService"
