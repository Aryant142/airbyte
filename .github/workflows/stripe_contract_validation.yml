name: Stripe Connector Specmatic Reports

on:
  push:
    paths:
      - "airbyte-integrations/connectors/source-stripe/**"
      - "specmatic_test/**"
      - ".github/workflows/stripe_contract_validation.yml"
  pull_request:
    paths:
      - "airbyte-integrations/connectors/source-stripe/**"
      - "specmatic_test/**"
      - ".github/workflows/stripe_contract_validation.yml"

jobs:
  validate-contract:
    name: Run Specmatic Reports
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Specmatic
        run: npm install -g specmatic@2.50.1

      - name: Run Specmatic Integration Tests (Generates Stub Report)
        run: |
          pip install pytest freezegun pytest-mock requests-mock mock airbyte-cdk==6.61.6 requests pyyaml jsonschema
          cd airbyte-integrations/connectors/source-stripe/unit_tests
          pytest -v integration/test_accounts.py integration/test_charges_specmatic.py integration/test_customers_specmatic.py integration/test_invoices_specmatic.py integration/test_payment_intents_specmatic.py integration/test_prices_specmatic.py integration/test_products_specmatic.py integration/test_refunds_specmatic.py
        continue-on-error: true

      - name: Start Accounts Stub Server
        run: |
          python specmatic_test/accounts_stub_server.py --port 3000 --host 0.0.0.0 &
          echo "Waiting for stub server..."
          for i in {1..15}; do
            curl -s http://localhost:3000/health && break
            sleep 1
          done
        if: always()

      - name: Run Specmatic Accounts Contract Test (Generates Test Report with Actuator ON)
        run: |
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            -e endpointsAPI=http://host.docker.internal:3000/actuator/mappings \
            specmatic/specmatic:2.50.1 test \
            --host=host.docker.internal \
            --port=3000 \
            --config specmatic-accounts-test.yaml \
            --endpointsAPI=http://host.docker.internal:3000/actuator/mappings \
            --timeout=30 \
            --junitReportDir=build/reports/specmatic/junit
        continue-on-error: true
        if: always()

      - name: Stop Accounts Stub Server
        run: |
          pkill -f "accounts_stub_server.py" || true
        if: always()

      - name: Convert JUnit XML to CTRF JSON
        run: |
          npx junit-to-ctrf build/reports/specmatic/junit/*.xml --output build/reports/specmatic/ctrf-report.json
        if: always()

      - name: Publish CTRF Test Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: |
            build/reports/specmatic/test/*.json
            build/reports/specmatic/stub/*.json
            build/reports/specmatic/*.json
          github-report: true
          annotate: true
        if: always()

      - name: Upload Specmatic Reports
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-reports
          path: |
            build/reports/specmatic/test/html/
            build/reports/specmatic/stub/html/
            build/reports/specmatic/**/*.json
        if: always()
